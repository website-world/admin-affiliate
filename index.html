<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Sistem Terintegrasi</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #ffffff;
      --black: #111111;
      --gray-light: #f5f5f5;
      --gray-mid: #e0e0e0;
      --gray-text: #888888;
      --green: #1f8a4c;
      --red: #c0392b;
      --amber: #b4790f;
      --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      font-size: 13px;
      letter-spacing: 0.03em;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; cursor: pointer; }
    button { font-family: var(--font); }

    .login-screen {
      display: none; min-height: 100vh; align-items: center; justify-content: center;
      background: var(--white); padding: 24px;
    }
    .login-screen.active { display: flex; }
    .login-box { width: 100%; max-width: 380px; }
    .login-logo {
      font-size: 18px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
      text-align: center; margin-bottom: 6px;
    }
    .login-tagline {
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; text-align: center;
      color: var(--gray-text); margin-bottom: 40px;
    }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .field-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      margin-bottom: 8px; display: block;
    }
    .field-input, .field-select {
      width: 100%; font-family: var(--font); font-size: 13px; letter-spacing: 0.02em;
      padding: 12px 14px; border: 1px solid var(--gray-mid); background: var(--white);
      outline: none; transition: border-color 0.2s;
    }
    .field-input:focus, .field-select:focus { border-color: var(--black); }
    .role-picker { display: flex; gap: 8px; margin-bottom: 4px; }
    .role-pill {
      flex: 1; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      text-align: center; padding: 10px 4px; border: 1px solid var(--gray-mid);
      background: var(--white); cursor: pointer; transition: all 0.2s;
    }
    .role-pill.active { background: var(--black); color: var(--white); border-color: var(--black); }
    .login-error { font-size: 11px; color: var(--red); letter-spacing: 0.05em; display: none; }
    .login-error.show { display: block; }

    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 28px; background: var(--black); color: var(--white);
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      border: none; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: #333; }
    .btn-primary:disabled { background: var(--gray-mid); color: var(--gray-text); cursor: not-allowed; }
    .btn-secondary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 24px; background: var(--white); color: var(--black);
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      border: 1px solid var(--gray-mid); cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--black); }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px; background: none; border: none;
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--gray-text); cursor: pointer; padding: 6px 0; transition: color 0.2s;
    }
    .btn-ghost:hover { color: var(--black); }
    .btn-danger { color: var(--red); }
    .btn-danger:hover { opacity: 0.7; }

    .app-shell { display: none; min-height: 100vh; }
    .app-shell.active { display: flex; }
    .sidebar {
      width: 230px; flex-shrink: 0; background: var(--white); border-right: 1px solid var(--gray-mid);
      display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0;
    }
    .sidebar-brand { padding: 22px 24px; border-bottom: 1px solid var(--gray-mid); }
    .sidebar-logo {
      font-size: 14px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase;
    }
    .sidebar-role {
      font-size: 9.5px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray-text); margin-top: 4px;
    }
    .sidebar-nav { flex: 1; overflow-y: auto; padding: 16px 0; }
    .nav-group-label {
      font-size: 9.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gray-text); padding: 14px 24px 8px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 11px 24px; font-size: 11.5px;
      font-weight: 500; letter-spacing: 0.05em; cursor: pointer; border-left: 2px solid transparent;
      color: #444; transition: all 0.15s;
    }
    .nav-item:hover { background: var(--gray-light); color: var(--black); }
    .nav-item.active {
      border-left-color: var(--black); background: var(--gray-light); color: var(--black); font-weight: 700;
    }
    .nav-item i { width: 14px; text-align: center; font-size: 12px; }
    .sidebar-footer { padding: 16px 24px 22px; border-top: 1px solid var(--gray-mid); }
    .sidebar-user { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; margin-bottom: 2px; }
    .sidebar-email { font-size: 10px; color: var(--gray-text); letter-spacing: 0.02em; margin-bottom: 12px; word-break: break-all; }

    .main-content { flex: 1; min-width: 0; height: 100vh; overflow-y: auto; }
    .content-header {
      position: sticky; top: 0; background: rgba(255,255,255,0.97); backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--gray-mid); padding: 22px 36px; display: flex;
      align-items: baseline; justify-content: space-between; z-index: 10; flex-wrap: wrap; gap: 12px;
    }
    .page-eyebrow {
      font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gray-text); margin-bottom: 4px;
    }
    .page-title {
      font-size: 20px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .content-body { padding: 32px 36px 60px; }
    .view { display: none; }
    .view.active { display: block; animation: viewIn 0.3s ease; }
    @keyframes viewIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1px;
      background: var(--gray-mid); border: 1px solid var(--gray-mid); margin-bottom: 32px;
    }
    .stat-card { background: var(--white); padding: 22px 24px; }
    .stat-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gray-text); margin-bottom: 12px;
    }
    .stat-value { font-size: 28px; font-weight: 700; letter-spacing: 0; margin-bottom: 6px; }

    .panel { border: 1px solid var(--gray-mid); margin-bottom: 28px; }
    .panel-header {
      display: flex; align-items: center; justify-content: space-between; padding: 16px 22px;
      border-bottom: 1px solid var(--gray-mid); flex-wrap: wrap; gap: 10px;
    }
    .panel-title { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
    .panel-sub { font-size: 10.5px; color: var(--gray-text); letter-spacing: 0.04em; margin-top: 2px; }
    .panel-body { padding: 22px; }
    .panel-body.no-pad { padding: 0; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
    thead th {
      text-align: left; font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--gray-text); padding: 12px 22px;
      border-bottom: 1px solid var(--gray-mid); white-space: nowrap;
    }
    tbody td { padding: 13px 22px; border-bottom: 1px solid var(--gray-mid); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--gray-light); }
    .cell-strong { font-weight: 700; }
    .cell-muted { color: var(--gray-text); }
    .table-actions { display: flex; gap: 14px; }
    .table-actions a {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      text-decoration: underline; cursor: pointer;
    }

    .badge {
      display: inline-flex; align-items: center; padding: 4px 10px; font-size: 9.5px;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border-radius: 2px;
    }
    .badge-green { background: #eaf5ef; color: var(--green); }
    .badge-red { background: #fbeae8; color: var(--red); }
    .badge-gray { background: var(--gray-light); color: var(--gray-text); }
    .badge-amber { background: #fbf2e2; color: var(--amber); }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto; background: var(--white);
      transform: translateY(16px); transition: transform 0.25s;
    }
    .modal-overlay.open .modal-box { transform: translateY(0); }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--gray-mid);
    }
    .modal-title { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; }
    .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .modal-footer {
      padding: 18px 24px; border-top: 1px solid var(--gray-mid);
      display: flex; justify-content: flex-end; gap: 10px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field-textarea {
      width: 100%; font-family: var(--font); font-size: 13px; padding: 12px 14px;
      border: 1px solid var(--gray-mid); outline: none; resize: vertical; min-height: 80px;
      transition: border-color 0.2s;
    }
    .field-textarea:focus { border-color: var(--black); }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--black); color: var(--white); padding: 13px 24px; font-size: 11px;
      letter-spacing: 0.1em; text-transform: uppercase; z-index: 300;
      opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 800px) {
      .sidebar { width: 64px; }
      .sidebar-brand, .sidebar-footer { padding: 18px 10px; text-align: center; }
      .sidebar-logo { font-size: 10px; }
      .sidebar-role, .sidebar-email, .sidebar-user, .nav-group-label { display: none; }
      .nav-item span { display: none; }
      .nav-item { justify-content: center; padding: 13px 0; }
      .content-header, .content-body { padding-left: 18px; padding-right: 18px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-screen active" id="login-screen">
    <div class="login-box">
      <div class="login-logo">Admin Panel</div>
      <div class="login-tagline">Presensi & E‑Commerce</div>
      <form class="login-form" id="login-form">
        <div>
          <label class="field-label">Masuk Sebagai</label>
          <div class="role-picker">
            <div class="role-pill active" data-role="super_admin">Super Admin</div>
            <div class="role-pill" data-role="admin">Admin</div>
            <div class="role-pill" data-role="affiliate">Affiliate</div>
          </div>
        </div>
        <div>
          <label class="field-label">Email</label>
          <input type="email" class="field-input" id="login-email" required placeholder="admin@example.com">
        </div>
        <div>
          <label class="field-label">Password</label>
          <input type="password" class="field-input" id="login-password" required placeholder="••••••••">
        </div>
        <div class="login-error" id="login-error"></div>
        <button type="submit" class="btn-primary"><i class="fa-solid fa-right-to-bracket"></i> Masuk</button>
      </form>
    </div>
  </div>

  <!-- APP SHELL -->
  <div class="app-shell" id="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-logo">ADMIN</div>
        <div class="sidebar-role" id="sidebar-role-label"></div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebar-user-name"></div>
        <div class="sidebar-email" id="sidebar-user-email"></div>
        <button class="btn-ghost" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="content-header">
        <div>
          <div class="page-eyebrow">Admin Panel</div>
          <div class="page-title" id="page-title">Dashboard</div>
        </div>
      </div>
      <div class="content-body">
        <div class="view active" id="view-dashboard"></div>
        <div class="view" id="view-products"></div>
        <div class="view" id="view-attendances"></div>
        <div class="view" id="view-notifications"></div>
        <div class="view" id="view-users"></div>
        <div class="view" id="view-referral"></div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Firebase SDK (tanpa Storage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    // Konfigurasi Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCW77c9sWDm1dmF8M_7fEs8J7GkylyhnWI",
      authDomain: "presensi-ecommerce.firebaseapp.com",
      projectId: "presensi-ecommerce",
      storageBucket: "presensi-ecommerce.firebasestorage.app",
      messagingSenderId: "1086583211791",
      appId: "1:1086583211791:web:0a2e3a24cbc5afef9ae07a"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    /* ---------- GLOBAL STATE ---------- */
    let currentUser = null;
    let currentRole = null;
    let selectedRole = 'super_admin';
    let products = [];

    const ROLE_LABELS = {
      super_admin: 'Super Admin',
      admin: 'Admin',
      affiliate: 'Affiliate'
    };

    const NAV_CONFIG = {
      super_admin: [
        { group: 'Utama', items: [{ id: 'dashboard', label: 'Dashboard', icon: 'fa-gauge-high' }] },
        { group: 'Manajemen', items: [
          { id: 'products', label: 'Produk', icon: 'fa-box' },
          { id: 'attendances', label: 'Presensi', icon: 'fa-clipboard-user' },
          { id: 'notifications', label: 'Notifikasi', icon: 'fa-bell' },
          { id: 'users', label: 'Pengguna', icon: 'fa-users' }
        ]}
      ],
      admin: [
        { group: 'Utama', items: [{ id: 'dashboard', label: 'Dashboard', icon: 'fa-gauge-high' }] },
        { group: 'Operasional', items: [
          { id: 'products', label: 'Produk', icon: 'fa-box' },
          { id: 'attendances', label: 'Presensi', icon: 'fa-clipboard-user' },
          { id: 'notifications', label: 'Notifikasi', icon: 'fa-bell' }
        ]}
      ],
      affiliate: [
        { group: 'Utama', items: [{ id: 'dashboard', label: 'Dashboard', icon: 'fa-gauge-high' }] },
        { group: 'Promosi', items: [{ id: 'referral', label: 'Link Referral', icon: 'fa-link' }] }
      ]
    };

    /* ---------- AUTH ---------- */
    document.querySelectorAll('.role-pill').forEach(pill => {
      pill.addEventListener('click', function() {
        selectedRole = this.dataset.role;
        document.querySelectorAll('.role-pill').forEach(p => p.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('login-error').classList.remove('show');
      });
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      errorEl.classList.remove('show');
      try {
        const userCred = await auth.signInWithEmailAndPassword(email, pass);
        const userDoc = await db.collection('users').doc(userCred.user.uid).get();
        if (!userDoc.exists || userDoc.data().role !== selectedRole) {
          await auth.signOut();
          throw new Error('Role tidak sesuai atau akun tidak ditemukan.');
        }
        currentUser = userDoc.data();
        currentUser.uid = userCred.user.uid;
        currentRole = userDoc.data().role;
        showApp();
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
      }
    });

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (userDoc.exists && ['super_admin','admin','affiliate'].includes(userDoc.data().role)) {
          currentUser = userDoc.data();
          currentUser.uid = user.uid;
          currentRole = userDoc.data().role;
          if (!document.getElementById('app-shell').classList.contains('active')) showApp();
        } else {
          await auth.signOut();
        }
      } else {
        showLogin();
      }
    });

    function showLogin() {
      document.getElementById('login-screen').classList.add('active');
      document.getElementById('app-shell').classList.remove('active');
      currentUser = null;
      currentRole = null;
    }

    function showApp() {
      document.getElementById('login-screen').classList.remove('active');
      document.getElementById('app-shell').classList.add('active');
      document.getElementById('sidebar-user-name').textContent = currentUser.name || '';
      document.getElementById('sidebar-user-email').textContent = currentUser.email || '';
      document.getElementById('sidebar-role-label').textContent = ROLE_LABELS[currentRole];
      renderSidebar();
      navigateTo('dashboard');
    }

    async function handleLogout() {
      await auth.signOut();
    }

    /* ---------- SIDEBAR ---------- */
    function renderSidebar() {
      const nav = document.getElementById('sidebar-nav');
      const groups = NAV_CONFIG[currentRole] || [];
      nav.innerHTML = groups.map(group => `
        <div class="nav-group-label">${group.group}</div>
        ${group.items.map(item => `
          <div class="nav-item" data-view="${item.id}" onclick="navigateTo('${item.id}')">
            <i class="fa-solid ${item.icon}"></i>
            <span>${item.label}</span>
          </div>
        `).join('')}
      `).join('');
    }

    /* ---------- NAVIGATION ---------- */
    function navigateTo(viewId) {
      if (!currentRole) return;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      const activeItem = document.querySelector(`.nav-item[data-view="${viewId}"]`);
      if (activeItem) activeItem.classList.add('active');
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      const viewEl = document.getElementById('view-' + viewId);
      if (viewEl) viewEl.classList.add('active');
      document.getElementById('page-title').textContent = {
        dashboard: 'Dashboard', products: 'Produk', attendances: 'Presensi',
        notifications: 'Notifikasi', users: 'Pengguna', referral: 'Link Referral'
      }[viewId] || '';
      if (viewId === 'dashboard') loadDashboard();
      else if (viewId === 'products') loadProducts();
      else if (viewId === 'attendances') loadAttendances();
      else if (viewId === 'notifications') loadNotifications();
      else if (viewId === 'users') loadUsers();
      else if (viewId === 'referral') loadReferral();
    }

    /* ---------- DASHBOARD ---------- */
    async function loadDashboard() {
      const container = document.getElementById('view-dashboard');
      if (currentRole === 'super_admin' || currentRole === 'admin') {
        const today = new Date().toISOString().split('T')[0];
        const prodSnap = await db.collection('products').get();
        const attSnap = await db.collection('attendances').where('date', '==', today).get();
        container.innerHTML = `
          <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">Produk</div><div class="stat-value">${prodSnap.size}</div></div>
            <div class="stat-card"><div class="stat-label">Presensi Hari Ini</div><div class="stat-value">${attSnap.size}</div></div>
          </div>`;
      } else if (currentRole === 'affiliate') {
        const doc = await db.collection('users').doc(currentUser.uid).get();
        const data = doc.data();
        container.innerHTML = `
          <div class="stat-grid">
            <div class="stat-card"><div class="stat-label">Klik Referral</div><div class="stat-value">${data.clicks || 0}</div></div>
            <div class="stat-card"><div class="stat-label">Komisi</div><div class="stat-value">${data.commissionRate || 0}%</div></div>
          </div>
          <div class="panel"><div class="panel-header"><div class="panel-title">Link Referral Anda</div></div>
          <div class="panel-body"><input class="field-input" value="https://tokoanda.com?ref=${data.referralCode || 'default'}" readonly></div></div>`;
      }
    }

    /* ---------- PRODUCTS (CRUD) ---------- */
    function loadProducts() {
      db.collection('products').onSnapshot(snap => {
        products = [];
        snap.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
        renderProductsTable();
      });
    }

    function renderProductsTable() {
      const container = document.getElementById('view-products');
      const canEdit = (currentRole === 'super_admin' || currentRole === 'admin');
      let html = `<div class="panel">
        <div class="panel-header">
          <div><div class="panel-title">Daftar Produk</div><div class="panel-sub">${products.length} produk</div></div>
          ${canEdit ? '<button class="btn-primary" onclick="openProductForm()"><i class="fa-solid fa-plus"></i> Tambah Produk</button>' : ''}
        </div>
        <div class="panel-body no-pad">
          <table>
            <thead><tr><th>Produk</th><th>Harga</th><th>Sale</th>${canEdit ? '<th>Aksi</th>' : ''}</tr></thead>
            <tbody>`;
      products.forEach(p => {
        html += `<tr>
          <td class="cell-strong">${p.name}</td>
          <td>Rp ${p.price?.toLocaleString('id-ID')}</td>
          <td><span class="badge ${p.sale ? 'badge-green' : 'badge-gray'}">${p.sale ? 'Ya' : 'Tidak'}</span></td>
          ${canEdit ? `<td class="table-actions">
            <a onclick="editProduct('${p.id}')">Edit</a>
            <a class="btn-danger" onclick="deleteProduct('${p.id}')">Hapus</a>
          </td>` : ''}
        </tr>`;
      });
      html += `</tbody></table></div></div>`;
      if (canEdit) {
        html += `
        <div class="modal-overlay" id="product-modal">
          <div class="modal-box">
            <div class="modal-header">
              <div class="modal-title" id="product-modal-title">Tambah Produk</div>
              <button class="modal-close" onclick="closeModal('product-modal')">&times;</button>
            </div>
            <form id="product-form">
              <input type="hidden" id="product-id">
              <div class="modal-body">
                <div><label class="field-label">Nama Produk</label><input class="field-input" id="prod-name" required></div>
                <div><label class="field-label">Harga</label><input type="number" class="field-input" id="prod-price" required></div>
                <div><label class="field-label">Sale</label><select class="field-select" id="prod-sale"><option value="false">Tidak</option><option value="true">Ya</option></select></div>
                <div><label class="field-label">Gambar Thumb</label><input type="file" class="field-input" id="prod-thumb" accept="image/*"></div>
                <div id="thumb-preview" style="max-width:200px;"></div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn-secondary" onclick="closeModal('product-modal')">Batal</button>
                <button type="submit" class="btn-primary">Simpan</button>
              </div>
            </form>
          </div>
        </div>`;
      }
      container.innerHTML = html;
      if (canEdit) {
        document.getElementById('product-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const id = document.getElementById('product-id').value;
          const name = document.getElementById('prod-name').value;
          const price = Number(document.getElementById('prod-price').value);
          const sale = document.getElementById('prod-sale').value === 'true';
          const thumbFile = document.getElementById('prod-thumb').files[0];

          let thumbnailBase64 = '';
          if (thumbFile) {
            thumbnailBase64 = await compressAndToBase64(thumbFile, 300, 300, 0.7);
          } else if (id) {
            // keep existing image
            const existing = products.find(p => p.id === id);
            thumbnailBase64 = existing ? existing.thumbnailBase64 || '' : '';
          }

          const docData = {
            name,
            price,
            sale,
            thumbnailBase64,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
          };
          if (id) {
            await db.collection('products').doc(id).update(docData);
          } else {
            await db.collection('products').add(docData);
          }
          closeModal('product-modal');
          showToast('Produk disimpan.');
        });
      }
    }

    function openProductForm(id = null) {
      document.getElementById('product-form').reset();
      document.getElementById('product-id').value = id || '';
      document.getElementById('product-modal-title').textContent = id ? 'Edit Produk' : 'Tambah Produk';
      document.getElementById('thumb-preview').innerHTML = '';
      if (id) {
        const prod = products.find(p => p.id === id);
        if (prod) {
          document.getElementById('prod-name').value = prod.name;
          document.getElementById('prod-price').value = prod.price;
          document.getElementById('prod-sale').value = prod.sale ? 'true' : 'false';
          if (prod.thumbnailBase64) {
            document.getElementById('thumb-preview').innerHTML = `<img src="${prod.thumbnailBase64}" style="max-width:100%;">`;
          }
        }
      }
      openModal('product-modal');
    }

    function editProduct(id) { openProductForm(id); }

    async function deleteProduct(id) {
      if (confirm('Hapus produk ini?')) {
        await db.collection('products').doc(id).delete();
        showToast('Produk dihapus.');
      }
    }

    /* ---------- IMAGE COMPRESSION HELPER ---------- */
    function compressAndToBase64(file, maxWidth, maxHeight, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; }
            if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    /* ---------- ATTENDANCES ---------- */
    function loadAttendances() {
      db.collection('attendances').orderBy('createdAt', 'desc').onSnapshot(snap => {
        const container = document.getElementById('view-attendances');
        let html = `<div class="panel"><div class="panel-header"><div class="panel-title">Riwayat Presensi</div></div><div class="panel-body no-pad"><table><thead><tr><th>Nama</th><th>Tanggal</th><th>Waktu</th><th>Lokasi</th><th>Foto</th></tr></thead><tbody>`;
        snap.forEach(doc => {
          const d = doc.data();
          html += `<tr>
            <td>${d.name}</td><td>${d.date}</td><td>${d.time}</td>
            <td class="cell-muted">${d.location?.address || '-'}</td>
            <td><img src="${d.photoBase64 || 'https://placehold.co/40x40'}" width="40" height="40" style="object-fit:cover;"></td>
          </tr>`;
        });
        html += `</tbody></table></div></div>`;
        container.innerHTML = html;
      });
    }

    /* ---------- NOTIFICATIONS ---------- */
    function loadNotifications() {
      document.getElementById('view-notifications').innerHTML = `
        <div class="panel">
          <div class="panel-header"><div class="panel-title">Kirim Notifikasi</div></div>
          <div class="panel-body">
            <form id="notif-form">
              <div><label class="field-label">Judul</label><input class="field-input" id="notif-title" required></div>
              <div><label class="field-label">Pesan</label><textarea class="field-textarea" id="notif-body" required></textarea></div>
              <button type="submit" class="btn-primary"><i class="fa-solid fa-paper-plane"></i> Kirim</button>
            </form>
          </div>
        </div>`;
      document.getElementById('notif-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('notif-title').value.trim();
        const body = document.getElementById('notif-body').value.trim();
        if (!title || !body) return;
        await db.collection('notifications').add({
          title, body, target: 'all', sentAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('Notifikasi dikirim.');
        document.getElementById('notif-form').reset();
      });
    }

    /* ---------- USERS ---------- */
    function loadUsers() {
      db.collection('users').where('role', 'in', ['admin','affiliate','karyawan']).onSnapshot(snap => {
        const container = document.getElementById('view-users');
        let html = `<div class="panel"><div class="panel-header"><div class="panel-title">Data Pengguna</div></div><div class="panel-body no-pad"><table><thead><tr><th>Nama</th><th>Email</th><th>Role</th><th>Aksi</th></tr></thead><tbody>`;
        snap.forEach(doc => {
          const u = doc.data();
          html += `<tr>
            <td>${u.name}</td><td>${u.email}</td>
            <td><span class="badge badge-gray">${ROLE_LABELS[u.role] || u.role}</span></td>
            <td class="table-actions"><a onclick="toggleUserActive('${doc.id}', ${!u.active})">${u.active !== false ? 'Nonaktifkan' : 'Aktifkan'}</a></td>
          </tr>`;
        });
        html += `</tbody></table></div></div>`;
        container.innerHTML = html;
      });
    }

    async function toggleUserActive(uid, active) {
      await db.collection('users').doc(uid).update({ active });
      showToast(`Pengguna ${active ? 'diaktifkan' : 'dinonaktifkan'}.`);
    }

    /* ---------- REFERRAL (AFFILIATE) ---------- */
    async function loadReferral() {
      const container = document.getElementById('view-referral');
      const doc = await db.collection('users').doc(currentUser.uid).get();
      const data = doc.data();
      container.innerHTML = `
        <div class="panel"><div class="panel-header"><div class="panel-title">Link Referral Anda</div></div>
        <div class="panel-body">
          <div style="display:flex; gap:8px;">
            <input class="field-input" value="https://tokoanda.com?ref=${data.referralCode || 'default'}" readonly>
            <button class="btn-secondary" onclick="copyLink()"><i class="fa-solid fa-copy"></i></button>
          </div>
          <p style="margin-top:16px;">Klik: ${data.clicks || 0}</p>
        </div></div>`;
    }

    function copyLink() {
      const input = document.querySelector('#view-referral input');
      input.select();
      document.execCommand('copy');
      showToast('Link disalin.');
    }

    /* ---------- MODAL & TOAST ---------- */
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2600);
    }
  </script>
</body>
</html>
