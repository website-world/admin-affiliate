<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Percetakan Jaya — Dashboard</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Google Identity Services (untuk login Google) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --black: #111111;
  --gray-light: #f5f5f5;
  --gray-mid: #e0e0e0;
  --gray-text: #888888;
  --green: #1a7d4a;
  --green-bg: #eaf5ef;
  --amber: #b4790f;
  --amber-bg: #fbf2e2;
  --red: #c0392b;
  --red-bg: #fbeae8;
  --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--white);
  color: var(--black);
  font-size: 13px;
  letter-spacing: 0.03em;
  overflow-x: hidden;
}

a { text-decoration: none; color: inherit; cursor: pointer; }
button { font-family: var(--font); }

/* ══════════════ LOGIN ══════════════ */
.login-screen {
  display: none;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  background: var(--white);
  padding: 24px;
}
.login-screen.active { display: flex; }

.login-box {
  width: 100%;
  max-width: 380px;
}

.login-logo {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 6px;
}

.login-tagline {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-align: center;
  color: var(--gray-text);
  margin-bottom: 40px;
}

.login-form { display: flex; flex-direction: column; gap: 16px; }

.field-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.field-input, .field-select {
  width: 100%;
  font-family: var(--font);
  font-size: 13px;
  letter-spacing: 0.02em;
  padding: 12px 14px;
  border: 1px solid var(--gray-mid);
  background: var(--white);
  outline: none;
  transition: border-color 0.2s;
}
.field-input:focus, .field-select:focus { border-color: var(--black); }

.role-picker { display: flex; gap: 8px; margin-bottom: 4px; }
.role-pill {
  flex: 1;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: center;
  padding: 10px 4px;
  border: 1px solid var(--gray-mid);
  background: var(--white);
  cursor: pointer;
  transition: all 0.2s;
}
.role-pill.active { background: var(--black); color: var(--white); border-color: var(--black); }

.login-error {
  font-size: 11px;
  color: var(--red);
  letter-spacing: 0.05em;
  display: none;
}
.login-error.show { display: block; }

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 28px;
  background: var(--black);
  color: var(--white);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-primary:hover { background: #333; }
.btn-primary:disabled { background: var(--gray-mid); color: var(--gray-text); cursor: not-allowed; }

.btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  background: var(--white);
  color: var(--black);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  border: 1px solid var(--gray-mid);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--black); }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-text);
  cursor: pointer;
  padding: 6px 0;
  transition: color 0.2s;
}
.btn-ghost:hover { color: var(--black); }

.btn-danger { color: var(--red); }
.btn-danger:hover { opacity: 0.7; }

.btn-sm { padding: 7px 14px; font-size: 9.5px; }

/* Google Login Button */
.google-login-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 13px 0;
  background: var(--white);
  color: var(--black);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: 1px solid var(--gray-mid);
  cursor: pointer;
  margin-top: 12px;
  transition: border-color 0.2s;
}
.google-login-btn:hover { border-color: var(--black); }
.google-login-btn img { width: 18px; height: 18px; }

/* ══════════════ APP SHELL ══════════════ */
.app-shell { display: none; min-height: 100vh; }
.app-shell.active { display: flex; }

.sidebar {
  width: 230px;
  flex-shrink: 0;
  background: var(--white);
  border-right: 1px solid var(--gray-mid);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: sticky;
  top: 0;
}

.sidebar-brand {
  padding: 22px 24px;
  border-bottom: 1px solid var(--gray-mid);
}
.sidebar-logo {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
}
.sidebar-role {
  font-size: 9.5px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gray-text);
  margin-top: 4px;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0;
}

.nav-group-label {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gray-text);
  padding: 14px 24px 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 24px;
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.05em;
  cursor: pointer;
  border-left: 2px solid transparent;
  color: #444;
  transition: all 0.15s;
}
.nav-item:hover { background: var(--gray-light); color: var(--black); }
.nav-item.active {
  border-left-color: var(--black);
  background: var(--gray-light);
  color: var(--black);
  font-weight: 700;
}
.nav-item i { width: 14px; text-align: center; font-size: 12px; }

.sidebar-footer {
  padding: 16px 24px 22px;
  border-top: 1px solid var(--gray-mid);
}
.sidebar-user {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 2px;
}
.sidebar-email {
  font-size: 10px;
  color: var(--gray-text);
  letter-spacing: 0.02em;
  margin-bottom: 12px;
  word-break: break-all;
}

/* ══════════════ MAIN CONTENT ══════════════ */
.main-content {
  flex: 1;
  min-width: 0;
  height: 100vh;
  overflow-y: auto;
}

.content-header {
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid var(--gray-mid);
  padding: 22px 36px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  z-index: 10;
  flex-wrap: wrap;
  gap: 12px;
}

.page-eyebrow {
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gray-text);
  margin-bottom: 4px;
}
.page-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.content-body { padding: 32px 36px 60px; }

.view { display: none; }
.view.active { display: block; animation: viewIn 0.3s ease; }
@keyframes viewIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ══════════════ STAT CARDS ══════════════ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1px;
  background: var(--gray-mid);
  border: 1px solid var(--gray-mid);
  margin-bottom: 32px;
}

.stat-card {
  background: var(--white);
  padding: 22px 24px;
}

.stat-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gray-text);
  margin-bottom: 12px;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0;
  margin-bottom: 6px;
}

.stat-delta {
  font-size: 10.5px;
  letter-spacing: 0.05em;
  font-weight: 600;
}
.stat-delta.up { color: var(--green); }
.stat-delta.down { color: var(--red); }
.stat-delta.flat { color: var(--gray-text); }

/* ══════════════ PANELS / SECTIONS ══════════════ */
.panel {
  border: 1px solid var(--gray-mid);
  margin-bottom: 28px;
}
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  border-bottom: 1px solid var(--gray-mid);
  flex-wrap: wrap;
  gap: 10px;
}
.panel-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.panel-sub {
  font-size: 10.5px;
  color: var(--gray-text);
  letter-spacing: 0.04em;
  margin-top: 2px;
}
.panel-body { padding: 22px; }
.panel-body.no-pad { padding: 0; }

.two-col {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 28px;
}
.dashboard-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 28px;
}

/* ══════════════ TABLES ══════════════ */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
thead th {
  text-align: left;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-text);
  padding: 12px 22px;
  border-bottom: 1px solid var(--gray-mid);
  white-space: nowrap;
}
tbody td {
  padding: 13px 22px;
  border-bottom: 1px solid var(--gray-mid);
  letter-spacing: 0.02em;
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--gray-light); }
.cell-strong { font-weight: 700; }
.cell-muted { color: var(--gray-text); }
.table-actions { display: flex; gap: 14px; }
.table-actions a {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-decoration: underline;
  cursor: pointer;
}

.empty-row td {
  text-align: center;
  padding: 40px 22px;
  color: var(--gray-text);
  font-size: 11px;
  letter-spacing: 0.05em;
}

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 22px;
  border-top: 1px solid var(--gray-mid);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  color: var(--gray-text);
}
.pagination-btns { display: flex; gap: 6px; }
.page-btn {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--gray-mid);
  background: var(--white);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.page-btn:hover:not(:disabled) { border-color: var(--black); }
.page-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
.page-btn:disabled { color: var(--gray-mid); cursor: not-allowed; }

/* ══════════════ BADGES — !important agar tidak tertimpa style lain */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 2px;
}
.badge-green { background: #eaf5ef !important; color: #1a7d4a !important; }
.badge-amber { background: #fbf2e2 !important; color: #b4790f !important; }
.badge-red { background: #fbeae8 !important; color: #c0392b !important; }
.badge-gray { background: #f5f5f5 !important; color: #888888 !important; }

/* ══════════════ FORMS / MODAL ══════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal-box {
  width: 100%;
  max-width: 460px;
  max-height: 88vh;
  overflow-y: auto;
  background: var(--white);
  transform: translateY(16px);
  transition: transform 0.25s;
}
.modal-overlay.open .modal-box { transform: translateY(0); }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--gray-mid);
}
.modal-title { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; }
.modal-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.modal-footer {
  padding: 18px 24px;
  border-top: 1px solid var(--gray-mid);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.field-textarea {
  width: 100%;
  font-family: var(--font);
  font-size: 13px;
  padding: 12px 14px;
  border: 1px solid var(--gray-mid);
  outline: none;
  resize: vertical;
  min-height: 80px;
  transition: border-color 0.2s;
}
.field-textarea:focus { border-color: var(--black); }

/* ══════════════ CHARTS / PROGRESS ══════════════ */
.chart-wrap { position: relative; width: 100%; overflow: visible; }
canvas { display: block; width: 100%; }
.chart-legend { display: flex; gap: 18px; margin-top: 14px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 0.05em; color: var(--gray-text); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.bar-list { display: flex; flex-direction: column; gap: 14px; }
.bar-row { display: flex; align-items: center; gap: 12px; }
.bar-label { font-size: 10.5px; letter-spacing: 0.04em; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 8px; background: var(--gray-light); position: relative; }
.bar-fill { height: 100%; background: var(--black); transition: width 0.6s ease; }
.bar-value { font-size: 10.5px; font-weight: 700; width: 40px; text-align: right; flex-shrink: 0; }

/* ══════════════ REFERRAL / AFFILIATE ══════════════ */
.referral-box {
  border: 1px solid var(--gray-mid);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.referral-link-row {
  display: flex;
  gap: 8px;
}
.referral-link-input {
  flex: 1;
  font-family: var(--font);
  font-size: 12px;
  padding: 12px 14px;
  border: 1px solid var(--gray-mid);
  background: var(--gray-light);
  color: var(--black);
  letter-spacing: 0.02em;
}
.coupon-display {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  border: 1px dashed var(--gray-mid);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.15em;
  width: fit-content;
}

/* ══════════════ TOAST ══════════════ */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--black);
  color: var(--white);
  padding: 13px 24px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════ INVOICE PRINT ══════════════ */
.invoice-paper {
  background: var(--white);
  border: 1px solid var(--gray-mid);
  padding: 40px;
  max-width: 640px;
  margin: 0 auto;
}
.invoice-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-bottom: 24px;
  border-bottom: 2px solid var(--black);
  margin-bottom: 24px;
}
.invoice-brand { font-size: 16px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }
.invoice-meta { text-align: right; font-size: 11px; color: var(--gray-text); line-height: 1.7; }
.invoice-meta b { color: var(--black); }
.invoice-parties { display: flex; justify-content: space-between; margin-bottom: 28px; gap: 24px; }
.invoice-party-label { font-size: 9.5px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray-text); margin-bottom: 6px; }
.invoice-party-name { font-size: 13px; font-weight: 700; }
.invoice-totals { margin-top: 18px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.invoice-total-row { display: flex; justify-content: space-between; width: 240px; font-size: 12px; }
.invoice-total-row.grand { font-weight: 700; font-size: 15px; border-top: 1px solid var(--black); padding-top: 8px; margin-top: 4px; }

@media print {
  .sidebar, .content-header, .no-print { display: none !important; }
  .main-content { height: auto; }
  body { font-size: 12px; }
}

/* ══════════════ RESPONSIVE ══════════════ */
@media (max-width: 1000px) {
  .two-col, .dashboard-grid { grid-template-columns: 1fr; }
}
@media (max-width: 800px) {
  .sidebar { width: 64px; }
  .sidebar-brand, .sidebar-footer { padding: 18px 10px; text-align: center; }
  .sidebar-logo { font-size: 10px; }
  .sidebar-role, .sidebar-email, .sidebar-user, .nav-group-label { display: none; }
  .nav-item span { display: none; }
  .nav-item { justify-content: center; padding: 13px 0; }
  .content-header, .content-body { padding-left: 18px; padding-right: 18px; }
  .form-row { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .page-title { font-size: 16px; }
}
</style>
</head>
<body>

<!-- ══════════════ LOGIN SCREEN ══════════════ -->
<div class="login-screen active" id="login-screen">
  <div class="login-box">
    <div class="login-logo">Percetakan Jaya</div>
    <div class="login-tagline">Sistem Manajemen Internal</div>

    <form class="login-form" id="login-form">
      <div>
        <label class="field-label">Masuk Sebagai</label>
        <div class="role-picker">
          <div class="role-pill active" data-role="super_admin" onclick="selectLoginRole('super_admin')">Super Admin</div>
          <div class="role-pill" data-role="admin" onclick="selectLoginRole('admin')">Admin</div>
          <div class="role-pill" data-role="affiliate" onclick="selectLoginRole('affiliate')">Affiliate</div>
        </div>
      </div>
      <div>
        <label class="field-label">Email</label>
        <input type="email" class="field-input" id="login-email" required placeholder="nama@email.com">
      </div>
      <div>
        <label class="field-label">Password</label>
        <div style="position:relative; display:flex;">
          <input type="password" class="field-input" id="login-password" required placeholder="••••••••" style="padding-right:42px;">
          <button type="button" id="pass-toggle-admin" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--gray-text); display:flex; align-items:center; padding:4px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="login-error" id="login-error"></div>
      <button type="submit" class="btn-primary"><i class="fa-solid fa-arrow-right-to-bracket"></i> Masuk</button>
    </form>

    <!-- Tombol Login Google khusus Affiliate -->
    <button class="google-login-btn" id="google-login-btn" type="button">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Masuk dengan Google (Affiliate)
    </button>
  </div>
</div>

<!-- ══════════════ APP SHELL ══════════════ -->
<div class="app-shell" id="app-shell">

function formatRupiah(n) {
  return 'Rp' + Math.round(n).toLocaleString('id-ID');
}

function formatRupiahSingkat(n) {
  if (n === 0) return 'Rp 0';
  if (n >= 1000000000) return 'Rp ' + (n / 1000000000).toFixed(1) + ' M';
  if (n >= 1000000) return 'Rp ' + (n / 1000000).toFixed(1) + ' Jt';
  if (n >= 1000) return 'Rp ' + (n / 1000).toFixed(0) + ' Rb';
  return 'Rp ' + n.toLocaleString('id-ID');
}

function formatDate(iso) {
  if (!iso) return '-';
  var d = new Date(iso);
  return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
}

function orderTotal(order) {
  return (order.qty || 0) * (order.price || 0);
}

function getInitials(name) {
  var parts = (name || '').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return '??';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

async function getCollection(collectionName) {
  var snapshot = await db.collection(collectionName).get();
  return snapshot.docs.map(function(doc) { var d = doc.data(); d.id = doc.id; return d; });
}

async function getCollectionWhere(collectionName, field, operator, value) {
  var snapshot = await db.collection(collectionName).where(field, operator, value).get();
  return snapshot.docs.map(function(doc) { var d = doc.data(); d.id = doc.id; return d; });
}

async function addDocument(collectionName, data) {
  var ref = await db.collection(collectionName).add(data);
  return ref.id;
}

async function updateDocument(collectionName, docId, data) {
  await db.collection(collectionName).doc(docId).update(data);
}

async function deleteDocument(collectionName, docId) {
  await db.collection(collectionName).doc(docId).delete();
}

async function getDocument(collectionName, docId) {
  var doc = await db.collection(collectionName).doc(docId).get();
  if (doc.exists) { var d = doc.data(); d.id = doc.id; return d; }
  return null;
}

function initAuth() {
  auth.onAuthStateChanged(async function(user) {
    if (user) {
      try {
        var doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists) {
          var data = doc.data();
          currentUser = { uid: user.uid, email: user.email, ...data };

          // Jika login via Google tapi role bukan affiliate → tolak
          if (user.providerData[0]?.providerId === 'google.com' && currentUser.role !== 'affiliate') {
            await auth.signOut();
            showToast('Akun Google hanya untuk Affiliate. Silakan gunakan email/password untuk role lain.');
            showLogin();
            return;
          }

          // HANYA super_admin, admin, affiliate YANG BOLEH AKSES
          if (!['super_admin', 'admin', 'affiliate'].includes(currentUser.role)) {
            await auth.signOut();
            showToast('Akses ditolak. Anda tidak memiliki akses ke dashboard ini.');
            showLogin();
            return;
          }

          showApp();
        } else {
          // User baru: tentukan role berdasarkan metode login
          var role = user.providerData[0]?.providerId === 'google.com' ? 'affiliate' : selectedLoginRole;
          await db.collection('users').doc(user.uid).set({
            name: user.displayName || user.email || 'User',
            email: user.email,
            role: role,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          currentUser = { uid: user.uid, email: user.email, name: user.displayName || user.email, role: role };
          showApp();
        }
      } catch (err) {
        console.error('Auth state error:', err);
        showLogin();
      }
    } else {
      currentUser = null;
      showLogin();
    }
  });
}

/* ---------- 1. Dashboard Keuangan ---------- */
async function renderDashboardKeuangan() {
  // Ambil data dari Firestore untuk TAHUN SEKARANG
  var financeDoc = await db.collection('finances').doc(String(currentYear)).get();
  
  var f;
  if (financeDoc.exists) {
    f = financeDoc.data();
    // Pastikan ada 12 bulan, jika kurang, tambahkan
    if (!f.months || f.months.length < 12) {
      var existingMonths = f.months || [];
      var existingIncome = f.income || [];
      var existingExpenses = f.expenses || [];
      
      var fullMonths = DEFAULT_MONTHS.slice();
      var fullIncome = [];
      var fullExpenses = [];
      
      for (var i = 0; i < fullMonths.length; i++) {
        var idx = existingMonths.indexOf(fullMonths[i]);
        if (idx !== -1) {
          fullIncome.push(existingIncome[idx] || 0);
          fullExpenses.push(existingExpenses[idx] || 0);
        } else {
          fullIncome.push(0);
          fullExpenses.push(0);
        }
      }
      
      f.months = fullMonths;
      f.income = fullIncome;
      f.expenses = fullExpenses;
      
      await db.collection('finances').doc(String(currentYear)).set(f);
    }
  } else {
    f = { months: DEFAULT_MONTHS.slice(), income: DEFAULT_VALUES.slice(), expenses: DEFAULT_VALUES.slice() };
  }

  var totalIncome = f.income.reduce(function(a, b) { return a + b; }, 0);
  var totalExpense = f.expenses.reduce(function(a, b) { return a + b; }, 0);
  var profit = totalIncome - totalExpense;
  var margin = totalIncome > 0 ? ((profit / totalIncome) * 100).toFixed(1) : 0;

  var incomeDelta = totalIncome > 0 ? 'up' : 'flat';
  var incomeText = totalIncome > 0 ? '<i class="fa-solid fa-arrow-up"></i> Akumulasi Jan–Des' : 'Belum ada data pemasukan';
  var expenseDelta = totalExpense > 0 ? 'down' : 'flat';
  var expenseText = totalExpense > 0 ? '<i class="fa-solid fa-arrow-down"></i> Akumulasi Jan–Des' : 'Belum ada data pengeluaran';

  var marginDelta = profit > 0 ? 'up' : 'flat';
  var marginText = profit > 0 ? 'Margin ' + margin + '%' : 'Belum ada keuntungan';

  var rows = f.months.map(function(m, i) {
    var inc = f.income[i] || 0, exp = f.expenses[i] || 0, p = inc - exp;
    var mg = inc > 0 ? ((p / inc) * 100).toFixed(1) : 0;
    var badgeClass = mg > 0 ? 'badge-green' : 'badge-gray';
    return '<tr>' +
      '<td class="cell-strong">' + m + ' ' + currentYear + '</td>' +
      '<td>' + formatRupiah(inc) + '</td>' +
      '<td class="cell-muted">' + formatRupiah(exp) + '</td>' +
      '<td class="cell-strong">' + formatRupiah(p) + '</td>' +
      '<td><span class="badge ' + badgeClass + '">' + mg + '%</span></td>' +
    '</tr>';
  }).join('');

  document.getElementById('view-dashboard-keuangan').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Total Pendapatan (12 Bln)</div>
        <div class="stat-value">${formatRupiah(totalIncome)}</div>
        <div class="stat-delta ${incomeDelta}">${incomeText}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Biaya (12 Bln)</div>
        <div class="stat-value">${formatRupiah(totalExpense)}</div>
        <div class="stat-delta ${expenseDelta}">${expenseText}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Keuntungan Bersih</div>
        <div class="stat-value">${formatRupiah(profit)}</div>
        <div class="stat-delta ${marginDelta}">${marginText}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rata-rata / Bulan</div>
        <div class="stat-value">${formatRupiah(f.months.length ? profit / f.months.length : 0)}</div>
        <div class="stat-delta flat">Profit bulanan</div>
      </div>
    </div>

    <!-- NAVIGASI TAHUN -->
    <div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
      <button class="btn-secondary btn-sm" onclick="changeFinanceYear(-1)"><i class="fa-solid fa-chevron-left"></i></button>
      <span style="font-size:15px; font-weight:700; letter-spacing:0.1em;">${currentYear}</span>
      <button class="btn-secondary btn-sm" onclick="changeFinanceYear(1)"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="panel-title">Grafik Cash Flow</div>
          <div class="panel-sub">Pemasukan vs pengeluaran per bulan</div>
        </div>
        <button class="btn-primary btn-sm" onclick="openFinanceModal()"><i class="fa-solid fa-pen-to-square"></i> Edit Data</button>
      </div>
      <div class="panel-body">
        <div class="chart-wrap">
          <canvas id="cashflow-canvas" height="220"></canvas>
        </div>
        <div class="chart-legend">
          <div class="legend-item"><span class="legend-dot" style="background:#111111"></span> Pemasukan</div>
          <div class="legend-item"><span class="legend-dot" style="background:#cccccc"></span> Pengeluaran</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="panel-title">Laporan Laba-Rugi (Income Statement)</div>
          <div class="panel-sub">Rincian per bulan, Januari – Desember ${currentYear}</div>
        </div>
      </div>
      <div class="panel-body no-pad">
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Bulan</th><th>Pemasukan</th><th>Pengeluaran</th><th>Laba Bersih</th><th>Margin</th></tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  setTimeout(function() { drawCashflowChart(f); }, 10);
}

/* ============================================================
   FUNGSI GRAFIK — DIPERBAIKI TOTAL
   ============================================================ */
function drawCashflowChart(f) {
  var canvas = document.getElementById('cashflow-canvas');
  if (!canvas) return;
  
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var W = canvas.clientWidth;
  var H = 220;
  
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  var allValues = f.income.concat(f.expenses);
  var maxVal = Math.max.apply(null, allValues);
  
  if (maxVal === 0) maxVal = 1;
  
  var padL = 45, padB = 28, padT = 12;
  var chartW = W - padL;
  var chartH = H - padT - padB;
  var groupW = chartW / f.months.length;
  var barW = Math.min(groupW * 0.32, 16);

  ctx.clearRect(0, 0, W, H);

  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1;
  ctx.font = '8px Helvetica Neue, Arial, sans-serif';
  ctx.fillStyle = '#888888';
  ctx.textAlign = 'right';
  
  for (var i = 0; i <= 4; i++) {
    var y = padT + chartH - (chartH * i / 4);
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(W, y);
    ctx.stroke();
    
    var val = (maxVal * i / 4);
    var label = formatRupiahSingkat(val);
    ctx.fillText(label, padL - 4, y + 3);
  }
  ctx.textAlign = 'center';

  for (var idx = 0; idx < f.months.length; idx++) {
    var x0 = padL + idx * groupW + groupW * 0.15;
    var incH = ((f.income[idx] || 0) / maxVal) * chartH;
    var expH = ((f.expenses[idx] || 0) / maxVal) * chartH;

    ctx.fillStyle = '#111111';
    ctx.fillRect(x0, padT + chartH - incH, barW, incH);

    ctx.fillStyle = '#cccccc';
    ctx.fillRect(x0 + barW + 3, padT + chartH - expH, barW, expH);

    ctx.fillStyle = '#888888';
    ctx.font = '7px Helvetica Neue, Arial, sans-serif';
    var labelX = x0 + barW + 1;
    if (idx === f.months.length - 1) {
      labelX = Math.min(labelX, W - 8);
    }
    ctx.fillText(f.months[idx], labelX, H - 6);
  }
}

async function openFinanceModal() {
  var doc = await db.collection('finances').doc(String(currentYear)).get();
  var data = doc.exists ? doc.data() : { months: DEFAULT_MONTHS.slice(), income: DEFAULT_VALUES.slice(), expenses: DEFAULT_VALUES.slice() };
  
  if (!data.months || data.months.length < 12) {
    var fullMonths = DEFAULT_MONTHS.slice();
    var fullIncome = [];
    var fullExpenses = [];
    var existingMonths = data.months || [];
    var existingIncome = data.income || [];
    var existingExpenses = data.expenses || [];
    
    for (var i = 0; i < fullMonths.length; i++) {
      var idx = existingMonths.indexOf(fullMonths[i]);
      if (idx !== -1) {
        fullIncome.push(existingIncome[idx] || 0);
        fullExpenses.push(existingExpenses[idx] || 0);
      } else {
        fullIncome.push(0);
        fullExpenses.push(0);
      }
    }
    data.months = fullMonths;
    data.income = fullIncome;
    data.expenses = fullExpenses;
  }
  
  var container = document.getElementById('finance-inputs');

  data.months.forEach(function(month, i) {
    var inc = data.income[i] || 0;
    var exp = data.expenses[i] || 0;

async function submitFinance(event) {
  event.preventDefault();

async function renderDashboardPerforma() {
  var orders = await getCollection('orders');
  var productions = await getCollection('productions');
  var thisMonthOrders = orders.filter(function(o) { return o.date && o.date.startsWith('2026-06'); });
  var lastMonthOrders = orders.filter(function(o) { return o.date && o.date.startsWith('2026-05'); });
  var delta = thisMonthOrders.length - lastMonthOrders.length;
  var deltaPct = lastMonthOrders.length ? ((delta / lastMonthOrders.length) * 100).toFixed(0) : 0;

  var productCount = {};
  orders.forEach(function(o) { productCount[o.product] = (productCount[o.product] || 0) + (o.qty || 0); });
  var topProducts = Object.entries(productCount).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);
  var maxQty = topProducts.length ? topProducts[0][1] : 1;

  var deltaClass = lastMonthOrders.length === 0 ? 'flat' : (delta >= 0 ? 'up' : 'down');
  var deltaText = lastMonthOrders.length === 0 ? '-' : '<i class="fa-solid fa-arrow-' + (delta >= 0 ? 'up' : 'down') + '"></i> ' + Math.abs(deltaPct) + '% vs bulan lalu';

  var prodValue = productions.length > 0 ? '4.2' : '-';
  var prodUnit = productions.length > 0 ? 'hari' : '';
  var prodLabel = productions.length > 0 ? 'Estimasi berdasarkan order selesai' : 'Belum ada data produksi';

  var topRows = topProducts.map(function(item) {
    var name = item[0], qty = item[1];
    return '<div class="bar-row">' +
      '<div class="bar-label" title="' + name + '">' + name + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + ((qty / maxQty) * 100) + '%"></div></div>' +
      '<div class="bar-value">' + qty + '</div>' +
    '</div>';
  }).join('');

  document.getElementById('view-dashboard-performa').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Order Bulan Ini</div>
        <div class="stat-value">${thisMonthOrders.length}</div>
        <div class="stat-delta ${deltaClass}">${deltaText}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Order Bulan Lalu</div>
        <div class="stat-value">${lastMonthOrders.length}</div>
        <div class="stat-delta flat">Mei 2026</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rata-rata Waktu Produksi</div>
        <div class="stat-value">${prodValue} <span style="font-size:14px;">${prodUnit}</span></div>
        <div class="stat-delta flat">${prodLabel}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Order (semua waktu)</div>
        <div class="stat-value">${orders.length}</div>
        <div class="stat-delta flat">Sejak awal pencatatan</div>
      </div>
    </div>

    <div class="dashboard-grid">
      <div class="panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Produk Terlaris</div>
            <div class="panel-sub">Berdasarkan total kuantitas terjual</div>
          </div>
        </div>
        <div class="panel-body">
          <div class="bar-list">${topRows}</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">Distribusi Status Order</div>
        </div>
        <div class="panel-body">${renderStatusDistribution(orders)}</div>
      </div>
    </div>
  `;
}

function renderStatusDistribution(orders) {
  var counts = { baru: 0, proses: 0, kirim: 0, selesai: 0 };
  orders.forEach(function(o) { if (o.status) counts[o.status]++; });
  var total = orders.length || 1;
  var rows = Object.entries(counts).map(function(item) {
    var status = item[0], count = item[1];
    var label = STATUS_LABELS[status]?.label || status;
    var badge = STATUS_LABELS[status]?.badge || 'badge-gray';
    return '<div class="bar-row">' +
      '<div class="bar-label">' + label + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + ((count / total) * 100) + '%"></div></div>' +
      '<div class="bar-value">' + count + '</div>' +
    '</div>';
  }).join('');
  return '<div class="bar-list">' + rows + '</div>';
}

  await db.collection('productions').doc(id).update({ status: newStatus });
  showToast('Status diubah ke "' + (PRODUCTION_STATUS_LABELS[newStatus]?.label || newStatus) + '".');
  renderInstruksiProduksi();

async function openUserModal(id) {

  document.getElementById('user-password').placeholder = id ? 'Kosongkan jika tidak diubah' : 'Minimal 6 karakter';

  if (id) {
    var u = await getDocument('users', id);
    if (u) {
      document.getElementById('user-id').value = u.id;
      document.getElementById('user-name').value = u.name || '';
      document.getElementById('user-email').value = u.email || '';
      document.getElementById('user-role').value = u.role || 'admin';
      document.getElementById('user-password').required = false;
      document.getElementById('user-password').placeholder = 'Kosongkan jika tidak diubah';
    }
  } else {
    document.getElementById('user-password').required = true;
    document.getElementById('user-password').placeholder = 'Minimal 6 karakter';
  }
  openModal('modal-user');
}

async function submitUser(event) {
  event.preventDefault();
  var id = document.getElementById('user-id').value;
  var name = document.getElementById('user-name').value.trim();
  var email = document.getElementById('user-email').value.trim();
  var password = document.getElementById('user-password').value;
  var role = document.getElementById('user-role').value;

  if (id) {
    var updateData = { name: name, email: email, role: role };
    await db.collection('users').doc(id).update(updateData);
    if (password && password.length >= 6) {
      await db.collection('users').doc(id).update({ password: password });
    }
    showToast('User berhasil diperbarui.');
  } else {
    if (!password || password.length < 6) {
      showToast('Password minimal 6 karakter.');
      return;
    }
    try {
      var cred = await auth.createUserWithEmailAndPassword(email, password);
      await db.collection('users').doc(cred.user.uid).set({
        name: name,
        email: email,
        role: role,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      showToast('User baru berhasil ditambahkan.');
    } catch (err) {
      showToast('Gagal membuat user: ' + err.message);
      return;
    }
  }
  closeModal('modal-user');
  renderKelolaUser();
}

async function deleteUser(id) {
  if (id === currentUser.uid) { showToast('Anda tidak bisa menghapus akun sendiri.'); return; }
  if (!confirm('Hapus user ini?')) return;
  await deleteDocument('users', id);
  showToast('User dihapus.');
  renderKelolaUser();
}

function changeOrderPage(page, viewId, readOnly) {
  orderPage = page;

}

async function openOrderModal() {
  document.getElementById('order-form').reset();
  document.getElementById('order-date').value = new Date().toISOString().slice(0, 10);
  openModal('modal-order');
}

async function submitOrder(event, viewId) {
  event.preventDefault();
  var data = {
    clientId: document.getElementById('order-client').value,
    product: document.getElementById('order-product').value.trim(),
    qty: Number(document.getElementById('order-qty').value),
    price: Number(document.getElementById('order-price').value),
    date: document.getElementById('order-date').value,
    status: 'baru',
    affiliateId: null,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  await addDocument('orders', data);
  closeModal('modal-order');
  showToast('Order baru berhasil dibuat.');
  orderPage = 1;
  renderKelolaOrder(viewId, false);
}

async function cycleOrderStatus(id, viewId) {
  var doc = await db.collection('orders').doc(id).get();
  if (!doc.exists) return;
  var o = doc.data();
  var order = ['baru', 'proses', 'kirim', 'selesai'];
  var idx = order.indexOf(o.status);
  var newStatus = order[(idx + 1) % order.length];
  await db.collection('orders').doc(id).update({ status: newStatus });
  showToast('Status order diubah ke "' + (STATUS_LABELS[newStatus]?.label || newStatus) + '".');
  renderKelolaOrder(viewId, false);
}

async function deleteOrder(id, viewId) {
  if (!confirm('Hapus order ini?')) return;
  await deleteDocument('orders', id);
  showToast('Order dihapus.');
  renderKelolaOrder(viewId, false);
}

  input.select();
  try {
    navigator.clipboard.writeText(input.value);
    showToast('Link referral disalin ke clipboard.');
  } catch (e) {
    showToast('Gagal menyalin. Salin manual dari kolom di atas.');
  }
}

async function renderStatistikAffiliate() {
  var aff = await getCollectionWhere('affiliates', 'userId', '==', currentUser.uid);
  if (!aff.length) {
    document.getElementById('view-statistik-affiliate').innerHTML = '<p class="cell-muted">Data affiliate tidak ditemukan.</p>';
    return;
  }
  var affiliate = aff[0];
  var orders = await getCollection('orders');
  var myOrders = orders.filter(function(o) { return o.affiliateId === affiliate.id; });

  var days = ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'];
  var weights = [0.18, 0.12, 0.15, 0.1, 0.2, 0.14, 0.11];
  var dailyClicks = weights.map(function(w) { return Math.round((affiliate.clicks || 0) * w / 4); });
  var maxClicks = Math.max.apply(null, dailyClicks.concat([1]));

  var barRows = days.map(function(d, i) {
    return '<div class="bar-row">' +
      '<div class="bar-label">' + d + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + ((dailyClicks[i] / maxClicks) * 100) + '%"></div></div>' +
      '<div class="bar-value">' + dailyClicks[i] + '</div>' +
    '</div>';
  }).join('');

  var convRate = (affiliate.clicks || 0) > 0 ? ((myOrders.length / (affiliate.clicks || 1)) * 100).toFixed(1) : 0;

  document.getElementById('view-statistik-affiliate').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="panel-title">Statistik Klik Mingguan</div>
          <div class="panel-sub">Estimasi distribusi klik referral per hari (minggu ini)</div>
        </div>
      </div>
      <div class="panel-body">
        <div class="bar-list">${barRows}</div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Conversion Rate</div>
        <div class="stat-value">${convRate}%</div>
        <div class="stat-delta flat">Order / Total Klik</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rate Komisi Anda</div>
        <div class="stat-value">${affiliate.commissionRate || 0}%</div>
        <div class="stat-delta flat">Per order berhasil</div>
      </div>
    </div>
  `;
}
