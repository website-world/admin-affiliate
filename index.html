<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Percetakan Jaya — Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --black: #111111;
  --gray-light: #f5f5f5;
  --gray-mid: #e0e0e0;
  --gray-text: #888888;
  --green: #1a7d4a;
  --green-bg: #eaf5ef;
  --amber: #b4790f;
  --amber-bg: #fbf2e2;
  --red: #c0392b;
  --red-bg: #fbeae8;
  --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--white);
  color: var(--black);
  font-size: 13px;
  letter-spacing: 0.03em;
  overflow-x: hidden;
}

a { text-decoration: none; color: inherit; cursor: pointer; }
button { font-family: var(--font); }

/* ══════════════ LOGIN ══════════════ */
.login-screen {
  display: none;                    /* <-- ditambahkan: sembunyikan default */
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  background: var(--white);
  padding: 24px;
}
.login-screen.active {             /* <-- ditambahkan: tampilkan saat ada class active */
  display: flex;
}

.login-box {
  width: 100%;
  max-width: 380px;
}

.login-logo {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 6px;
}

.login-tagline {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  text-align: center;
  color: var(--gray-text);
  margin-bottom: 40px;
}

.login-form { display: flex; flex-direction: column; gap: 16px; }

.field-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.field-input, .field-select {
  width: 100%;
  font-family: var(--font);
  font-size: 13px;
  letter-spacing: 0.02em;
  padding: 12px 14px;
  border: 1px solid var(--gray-mid);
  background: var(--white);
  outline: none;
  transition: border-color 0.2s;
}
.field-input:focus, .field-select:focus { border-color: var(--black); }

.role-picker { display: flex; gap: 8px; margin-bottom: 4px; }
.role-pill {
  flex: 1;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: center;
  padding: 10px 4px;
  border: 1px solid var(--gray-mid);
  background: var(--white);
  cursor: pointer;
  transition: all 0.2s;
}
.role-pill.active { background: var(--black); color: var(--white); border-color: var(--black); }

.login-error {
  font-size: 11px;
  color: var(--red);
  letter-spacing: 0.05em;
  display: none;
}
.login-error.show { display: block; }

.login-hint {
  margin-top: 28px;
  font-size: 10.5px;
  color: var(--gray-text);
  letter-spacing: 0.04em;
  line-height: 1.8;
  border-top: 1px solid var(--gray-mid);
  padding-top: 18px;
}
.login-hint b { color: var(--black); }

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 28px;
  background: var(--black);
  color: var(--white);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-primary:hover { background: #333; }
.btn-primary:disabled { background: var(--gray-mid); color: var(--gray-text); cursor: not-allowed; }

.btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  background: var(--white);
  color: var(--black);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  border: 1px solid var(--gray-mid);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover { border-color: var(--black); }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-text);
  cursor: pointer;
  padding: 6px 0;
  transition: color 0.2s;
}
.btn-ghost:hover { color: var(--black); }

.btn-danger { color: var(--red); }
.btn-danger:hover { opacity: 0.7; }

.btn-sm { padding: 7px 14px; font-size: 9.5px; }

/* ══════════════ APP SHELL ══════════════ */
.app-shell { display: none; min-height: 100vh; }
.app-shell.active { display: flex; }

.sidebar {
  width: 230px;
  flex-shrink: 0;
  background: var(--white);
  border-right: 1px solid var(--gray-mid);
  display: flex;
  flex-direction: column;
  height: 100vh;
  position: sticky;
  top: 0;
}

.sidebar-brand {
  padding: 22px 24px;
  border-bottom: 1px solid var(--gray-mid);
}
.sidebar-logo {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
}
.sidebar-role {
  font-size: 9.5px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gray-text);
  margin-top: 4px;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0;
}

.nav-group-label {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gray-text);
  padding: 14px 24px 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 24px;
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.05em;
  cursor: pointer;
  border-left: 2px solid transparent;
  color: #444;
  transition: all 0.15s;
}
.nav-item:hover { background: var(--gray-light); color: var(--black); }
.nav-item.active {
  border-left-color: var(--black);
  background: var(--gray-light);
  color: var(--black);
  font-weight: 700;
}
.nav-item i { width: 14px; text-align: center; font-size: 12px; }

.sidebar-footer {
  padding: 16px 24px 22px;
  border-top: 1px solid var(--gray-mid);
}
.sidebar-user {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 2px;
}
.sidebar-email {
  font-size: 10px;
  color: var(--gray-text);
  letter-spacing: 0.02em;
  margin-bottom: 12px;
  word-break: break-all;
}

/* ══════════════ MAIN CONTENT ══════════════ */
.main-content {
  flex: 1;
  min-width: 0;
  height: 100vh;
  overflow-y: auto;
}

.content-header {
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid var(--gray-mid);
  padding: 22px 36px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  z-index: 10;
  flex-wrap: wrap;
  gap: 12px;
}

.page-eyebrow {
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gray-text);
  margin-bottom: 4px;
}
.page-title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.content-body { padding: 32px 36px 60px; }

.view { display: none; }
.view.active { display: block; animation: viewIn 0.3s ease; }
@keyframes viewIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ══════════════ STAT CARDS ══════════════ */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 1px;
  background: var(--gray-mid);
  border: 1px solid var(--gray-mid);
  margin-bottom: 32px;
}

.stat-card {
  background: var(--white);
  padding: 22px 24px;
}

.stat-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gray-text);
  margin-bottom: 12px;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0;
  margin-bottom: 6px;
}

.stat-delta {
  font-size: 10.5px;
  letter-spacing: 0.05em;
  font-weight: 600;
}
.stat-delta.up { color: var(--green); }
.stat-delta.down { color: var(--red); }
.stat-delta.flat { color: var(--gray-text); }

/* ══════════════ PANELS / SECTIONS ══════════════ */
.panel {
  border: 1px solid var(--gray-mid);
  margin-bottom: 28px;
}
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 22px;
  border-bottom: 1px solid var(--gray-mid);
  flex-wrap: wrap;
  gap: 10px;
}
.panel-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.panel-sub {
  font-size: 10.5px;
  color: var(--gray-text);
  letter-spacing: 0.04em;
  margin-top: 2px;
}
.panel-body { padding: 22px; }
.panel-body.no-pad { padding: 0; }

.two-col {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 28px;
}
.dashboard-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 28px;
}

/* ══════════════ TABLES ══════════════ */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
thead th {
  text-align: left;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-text);
  padding: 12px 22px;
  border-bottom: 1px solid var(--gray-mid);
  white-space: nowrap;
}
tbody td {
  padding: 13px 22px;
  border-bottom: 1px solid var(--gray-mid);
  letter-spacing: 0.02em;
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--gray-light); }
.cell-strong { font-weight: 700; }
.cell-muted { color: var(--gray-text); }
.table-actions { display: flex; gap: 14px; }
.table-actions a {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-decoration: underline;
  cursor: pointer;
}

.empty-row td {
  text-align: center;
  padding: 40px 22px;
  color: var(--gray-text);
  font-size: 11px;
  letter-spacing: 0.05em;
}

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 22px;
  border-top: 1px solid var(--gray-mid);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  color: var(--gray-text);
}
.pagination-btns { display: flex; gap: 6px; }
.page-btn {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--gray-mid);
  background: var(--white);
  font-size: 10px;
  cursor: pointer;
  transition: all 0.15s;
}
.page-btn:hover:not(:disabled) { border-color: var(--black); }
.page-btn.active { background: var(--black); color: var(--white); border-color: var(--black); }
.page-btn:disabled { color: var(--gray-mid); cursor: not-allowed; }

/* ══════════════ BADGES ══════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 2px;
}
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-gray { background: var(--gray-light); color: var(--gray-text); }

/* ══════════════ FORMS / MODAL ══════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal-box {
  width: 100%;
  max-width: 460px;
  max-height: 88vh;
  overflow-y: auto;
  background: var(--white);
  transform: translateY(16px);
  transition: transform 0.25s;
}
.modal-overlay.open .modal-box { transform: translateY(0); }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--gray-mid);
}
.modal-title { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; }
.modal-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.modal-footer {
  padding: 18px 24px;
  border-top: 1px solid var(--gray-mid);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.field-textarea {
  width: 100%;
  font-family: var(--font);
  font-size: 13px;
  padding: 12px 14px;
  border: 1px solid var(--gray-mid);
  outline: none;
  resize: vertical;
  min-height: 80px;
  transition: border-color 0.2s;
}
.field-textarea:focus { border-color: var(--black); }

/* ══════════════ CHARTS / PROGRESS ══════════════ */
.chart-wrap { position: relative; width: 100%; }
.chart-legend { display: flex; gap: 18px; margin-top: 14px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 0.05em; color: var(--gray-text); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.bar-list { display: flex; flex-direction: column; gap: 14px; }
.bar-row { display: flex; align-items: center; gap: 12px; }
.bar-label { font-size: 10.5px; letter-spacing: 0.04em; width: 110px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 8px; background: var(--gray-light); position: relative; }
.bar-fill { height: 100%; background: var(--black); transition: width 0.6s ease; }
.bar-value { font-size: 10.5px; font-weight: 700; width: 40px; text-align: right; flex-shrink: 0; }

/* ══════════════ REFERRAL / AFFILIATE ══════════════ */
.referral-box {
  border: 1px solid var(--gray-mid);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.referral-link-row {
  display: flex;
  gap: 8px;
}
.referral-link-input {
  flex: 1;
  font-family: var(--font);
  font-size: 12px;
  padding: 12px 14px;
  border: 1px solid var(--gray-mid);
  background: var(--gray-light);
  color: var(--black);
  letter-spacing: 0.02em;
}
.coupon-display {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  border: 1px dashed var(--gray-mid);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.15em;
  width: fit-content;
}

/* ══════════════ TOAST ══════════════ */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--black);
  color: var(--white);
  padding: 13px 24px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════ INVOICE PRINT ══════════════ */
.invoice-paper {
  background: var(--white);
  border: 1px solid var(--gray-mid);
  padding: 40px;
  max-width: 640px;
  margin: 0 auto;
}
.invoice-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-bottom: 24px;
  border-bottom: 2px solid var(--black);
  margin-bottom: 24px;
}
.invoice-brand { font-size: 16px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }
.invoice-meta { text-align: right; font-size: 11px; color: var(--gray-text); line-height: 1.7; }
.invoice-meta b { color: var(--black); }
.invoice-parties { display: flex; justify-content: space-between; margin-bottom: 28px; gap: 24px; }
.invoice-party-label { font-size: 9.5px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray-text); margin-bottom: 6px; }
.invoice-party-name { font-size: 13px; font-weight: 700; }
.invoice-totals { margin-top: 18px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.invoice-total-row { display: flex; justify-content: space-between; width: 240px; font-size: 12px; }
.invoice-total-row.grand { font-weight: 700; font-size: 15px; border-top: 1px solid var(--black); padding-top: 8px; margin-top: 4px; }

@media print {
  .sidebar, .content-header, .no-print { display: none !important; }
  .main-content { height: auto; }
  body { font-size: 12px; }
}

/* ══════════════ RESPONSIVE ══════════════ */
@media (max-width: 1000px) {
  .two-col, .dashboard-grid { grid-template-columns: 1fr; }
}
@media (max-width: 800px) {
  .sidebar { width: 64px; }
  .sidebar-brand, .sidebar-footer { padding: 18px 10px; text-align: center; }
  .sidebar-logo { font-size: 10px; }
  .sidebar-role, .sidebar-email, .sidebar-user, .nav-group-label { display: none; }
  .nav-item span { display: none; }
  .nav-item { justify-content: center; padding: 13px 0; }
  .content-header, .content-body { padding-left: 18px; padding-right: 18px; }
  .form-row { grid-template-columns: 1fr; }
}
@media (max-width: 560px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .page-title { font-size: 16px; }
}

</style>
</head>
<body>

<!-- ══════════════ LOGIN SCREEN ══════════════ -->
<div class="login-screen active" id="login-screen">
  <div class="login-box">
    <div class="login-logo">Percetakan Jaya</div>
    <div class="login-tagline">Sistem Manajemen Internal</div>

    <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
      <div>
        <label class="field-label">Masuk Sebagai</label>
        <div class="role-picker">
          <div class="role-pill active" data-role="super_admin" onclick="selectLoginRole('super_admin')">Super Admin</div>
          <div class="role-pill" data-role="admin" onclick="selectLoginRole('admin')">Admin</div>
          <div class="role-pill" data-role="affiliate" onclick="selectLoginRole('affiliate')">Affiliate</div>
        </div>
      </div>
      <div>
        <label class="field-label">Email</label>
        <input type="email" class="field-input" id="login-email" required placeholder="nama@email.com">
      </div>
      <div>
        <label class="field-label">Password</label>
        <input type="password" class="field-input" id="login-password" required placeholder="••••••••">
      </div>
      <div class="login-error" id="login-error"></div>
      <button type="submit" class="btn-primary"><i class="fa-solid fa-arrow-right-to-bracket"></i> Masuk</button>
    </form>

    <div class="login-hint">
      <b>Akun demo</b><br>
      Super Admin — ceo@percetakanjaya.com / 123<br>
      Admin — admin@percetakanjaya.com / 123<br>
      Affiliate — budi@aff.com / 123
    </div>
  </div>
</div>

<!-- ══════════════ APP SHELL ══════════════ -->
<div class="app-shell" id="app-shell">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">Percetakan Jaya</div>
      <div class="sidebar-role" id="sidebar-role-label"></div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user-name"></div>
      <div class="sidebar-email" id="sidebar-user-email"></div>
      <button class="btn-ghost" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-header">
      <div>
        <div class="page-eyebrow">Percetakan Jaya</div>
        <div class="page-title" id="page-title">Dashboard</div>
      </div>
    </div>

    <div class="content-body">
      <!-- Super Admin views -->
      <div class="view" id="view-dashboard-keuangan"></div>
      <div class="view" id="view-dashboard-performa"></div>
      <div class="view" id="view-instruksi-produksi"></div>
      <div class="view" id="view-kelola-user"></div>
      <div class="view" id="view-kelola-produk"></div>
      <div class="view" id="view-kelola-order-superadmin"></div>

      <!-- Admin views -->

<script>
/* ============================================================

const SESSION_KEY = 'percetakan_app_session_v1';
let currentUser = null;
let selectedLoginRole = 'super_admin';

const ROLE_LABELS = {
  super_admin: 'Super Admin (CEO)',
  admin: 'Admin (CS & Operasional)',
  affiliate: 'Affiliate (Mitra)'
};

function initAuth() {
  const raw = sessionStorage.getItem(SESSION_KEY);
  if (raw) {
    try {
      const session = JSON.parse(raw);
      const user = DB.users.find(u => u.id === session.userId);
      if (user) {
        currentUser = user;
        showApp();
        return;
      }
    } catch (e) { /* fall through to login */ }
  }
  showLogin();
}

function showLogin() {
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('app-shell').classList.remove('active');
}

function showApp() {
  document.getElementById('login-screen').classList.remove('active');
  document.getElementById('app-shell').classList.add('active');
  renderSidebarForRole(currentUser.role);
  document.getElementById('sidebar-user-name').textContent = currentUser.name;
  document.getElementById('sidebar-user-email').textContent = currentUser.email;
  document.getElementById('sidebar-role-label').textContent = ROLE_LABELS[currentUser.role];
  navigateTo(defaultViewForRole(currentUser.role));
}

function selectLoginRole(role) {
  selectedLoginRole = role;
  document.querySelectorAll('.role-pill').forEach(el => {
    el.classList.toggle('active', el.dataset.role === role);
  });
  document.getElementById('login-error').classList.remove('show');
}

function handleLogin(event) {
  event.preventDefault();
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');

  const user = DB.users.find(u =>
    u.email.toLowerCase() === email &&
    u.password === password &&
    u.role === selectedLoginRole
  );

  if (!user) {
    errorEl.textContent = 'Email, password, atau role tidak cocok. Coba lagi.';
    errorEl.classList.add('show');
    return;
  }

  currentUser = user;
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({ userId: user.id }));
  document.getElementById('login-form').reset();
  errorEl.classList.remove('show');
  showApp();
}

function handleLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  currentUser = null;
  showLogin();
}

  if (role === 'super_admin') return 'dashboard-keuangan';
  if (role === 'admin') return 'dashboard-operasional';
  return 'dashboard-affiliate';
}

function drawCashflowChart() {
  const canvas = document.getElementById('cashflow-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 220 * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 220;

  const f = DB.finances;
  const maxVal = Math.max(...f.income, ...f.expenses) * 1.15;
  const padL = 50, padB = 28, padT = 12, padR = 12;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const groupW = chartW / f.months.length;
  const barW = groupW * 0.32;

  ctx.clearRect(0, 0, W, H);

  // grid lines
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 1;
  ctx.font = '10px Helvetica Neue, Arial, sans-serif';
  ctx.fillStyle = '#888888';
  for (let i = 0; i <= 4; i++) {
    const y = padT + chartH - (chartH * i / 4);
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(W - padR, y);
    ctx.stroke();
    const val = (maxVal * i / 4);
    ctx.fillText((val / 1000000).toFixed(0) + 'jt', 4, y + 3);
  }

  // bars
  f.months.forEach((m, i) => {
    const x0 = padL + i * groupW + groupW * 0.18;
    const incH = (f.income[i] / maxVal) * chartH;
    const expH = (f.expenses[i] / maxVal) * chartH;

    ctx.fillStyle = '#111111';
    ctx.fillRect(x0, padT + chartH - incH, barW, incH);

    ctx.fillStyle = '#cccccc';
    ctx.fillRect(x0 + barW + 4, padT + chartH - expH, barW, expH);

    ctx.fillStyle = '#888888';
    ctx.textAlign = 'center';
    ctx.fillText(m, x0 + barW + 2, H - 8);
  });
  ctx.textAlign = 'left';
}

function openProductionModal() {
  document.getElementById('production-form').reset();

}

function submitProduction(event) {
  event.preventDefault();
  const instruction = document.getElementById('prod-instruction').value.trim();
  const assignedTo = document.getElementById('prod-team').value;
  const deadline = document.getElementById('prod-deadline').value;

  DB.productions.push({
    id: nextId(DB.productions),
    instruction, assignedTo, deadline,
    status: 'pending', orderId: null
  });
  saveData();
  closeModal('modal-production');
  showToast('Instruksi produksi berhasil dikirim.');
  renderInstruksiProduksi();
}

function cycleProductionStatus(id) {
  const p = DB.productions.find(x => x.id === id);
  if (!p) return;
  const order = ['pending', 'progress', 'done'];
  const idx = order.indexOf(p.status);
  p.status = order[(idx + 1) % order.length];
  saveData();
  showToast(`Status diubah ke "${PRODUCTION_STATUS_LABELS[p.status].label}".`);
  renderInstruksiProduksi();
}

function deleteProduction(id) {
  if (!confirm('Hapus instruksi produksi ini?')) return;
  DB.productions = DB.productions.filter(x => x.id !== id);
  saveData();
  showToast('Instruksi produksi dihapus.');
  renderInstruksiProduksi();
}

function getProductCatalog() {
  const seen = new Map();
  DB.orders.forEach(o => {
    if (!seen.has(o.product)) seen.set(o.product, { name: o.product, price: o.price, totalSold: 0 });
    seen.get(o.product).totalSold += o.qty;
  });
  return Array.from(seen.values());
}

  document.getElementById('view-' + viewId).innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <div>

                    <td class="cell-strong">${c ? c.name : '-'}</td>
                    <td>${o.product}</td>
                    <td>${o.qty.toLocaleString('id-ID')}</td>

                        <a class="btn-danger" onclick="deleteOrder(${o.id}, '${viewId}')">Hapus</a>
                      `}
                    </td>
                  </tr>`;
                }).join('')}

            <button class="page-btn" ${orderPage >= totalPages ? 'disabled' : ''} onclick="changeOrderPage(${orderPage + 1}, '${viewId}', ${readOnly})"><i class="fa-solid fa-chevron-right"></i></button>
          </div>
        </div>
      </div>
    </div>

      <div class="modal-box">
        <div class="modal-header">
          <div class="modal-title">Order Baru</div>
          <button class="modal-close" onclick="closeModal('modal-order')">&times;</button>

            <thead><tr><th>Nama Affiliate</th><th>Link Referral</th><th>Klik</th><th>Komisi</th><th>Status</th><th>Aksi</th></tr></thead>
            <tbody>
              ${DB.affiliates.length === 0 ? `<tr class="empty-row"><td colspan="6">Belum ada affiliate.</td></tr>` :
                DB.affiliates.map(a => {
                  const u = getUser(a.userId);
                  return `<tr>
                    <td class="cell-strong">${u ? u.name : '-'}</td>
                    <td class="cell-muted">${a.referralLink}</td>
                    <td>${a.clicks}</td>
                    <td>
                      <input type="number" min="0" max="100" value="${a.commissionRate}"
                        style="width:60px; padding:6px 8px; border:1px solid var(--gray-mid); font-size:11px;"
                        onchange="updateCommission(${a.id}, this.value)"> %
                    </td>
                    <td><span class="badge ${a.active ? 'badge-green' : 'badge-gray'}">${a.active ? 'Aktif' : 'Nonaktif'}</span></td>
                    <td class="table-actions">
                      <a onclick="toggleAffiliateActive(${a.id})">${a.active ? 'Nonaktifkan' : 'Aktifkan'}</a>
                    </td>
                  </tr>`;
                }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function updateCommission(id, value) {
  const a = DB.affiliates.find(x => x.id === id);
  if (!a) return;
  a.commissionRate = Math.max(0, Math.min(100, Number(value) || 0));
  saveData();
  showToast(`Komisi diperbarui ke ${a.commissionRate}%.`);
}

function toggleAffiliateActive(id) {
  const a = DB.affiliates.find(x => x.id === id);
  if (!a) return;
  a.active = !a.active;
  saveData();
  showToast(`Affiliate ${a.active ? 'diaktifkan' : 'dinonaktifkan'}.`);
  renderKelolaAffiliate();
}

/* ---------- Buat Invoice ---------- */
function renderBuatInvoice() {
  document.getElementById('view-buat-invoice').innerHTML = `
    <div class="panel no-print">
      <div class="panel-header">
        <div>
          <div class="panel-title">Buat Invoice</div>
          <div class="panel-sub">Pilih order untuk dicetak menjadi invoice</div>
        </div>
      </div>
      <div class="panel-body">
        <label class="field-label">Pilih Order</label>
        <select class="field-select" id="invoice-order-select" onchange="renderInvoicePreview()" style="margin-bottom:0;">
          <option value="">— Pilih order —</option>
          ${DB.orders.map(o => {
            const c = getClient(o.clientId);
            return `<option value="${o.id}">#INV-${String(o.id).padStart(4, '0')} — ${c ? c.name : '-'} — ${o.product}</option>`;
          }).join('')}
        </select>
      </div>
    </div>

    <div id="invoice-preview-wrap"></div>
  `;
}

function renderInvoicePreview() {
  const orderId = Number(document.getElementById('invoice-order-select').value);
  const wrap = document.getElementById('invoice-preview-wrap');
  if (!orderId) { wrap.innerHTML = ''; return; }

  const o = DB.orders.find(x => x.id === orderId);
  const c = getClient(o.clientId);
  const total = orderTotal(o);
  const invoiceNo = 'INV-' + String(o.id).padStart(4, '0');

  wrap.innerHTML = `
    <div class="no-print" style="margin-bottom:16px; display:flex; gap:10px;">
      <button class="btn-primary" onclick="window.print()"><i class="fa-solid fa-print"></i> Cetak Invoice</button>
    </div>
    <div class="invoice-paper">
      <div class="invoice-top">
        <div class="invoice-brand">Percetakan Jaya</div>
        <div class="invoice-meta">
          <div><b>No. Invoice:</b> ${invoiceNo}</div>
          <div><b>Tanggal:</b> ${formatDate(o.date)}</div>
          <div><b>Status:</b> ${STATUS_LABELS[o.status].label}</div>
        </div>
      </div>
      <div class="invoice-parties">
        <div>
          <div class="invoice-party-label">Ditagihkan Kepada</div>
          <div class="invoice-party-name">${c ? c.name : '-'}</div>
          <div class="cell-muted" style="font-size:11px; margin-top:4px;">${c ? c.address : ''}</div>
          <div class="cell-muted" style="font-size:11px;">${c ? c.email : ''} · ${c ? c.phone : ''}</div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Produk</th><th>Qty</th><th>Harga Satuan</th><th>Subtotal</th></tr></thead>
          <tbody>
            <tr>
              <td class="cell-strong">${o.product}</td>
              <td>${o.qty.toLocaleString('id-ID')}</td>
              <td>${formatRupiah(o.price)}</td>
              <td>${formatRupiah(total)}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="invoice-totals">
        <div class="invoice-total-row"><span>Subtotal</span><span>${formatRupiah(total)}</span></div>
        <div class="invoice-total-row grand"><span>Total</span><span>${formatRupiah(total)}</span></div>
      </div>
    </div>
  `;
}

</script>
<script>
/* ============================================================
   VIEWS — AFFILIATE
   ============================================================ */

function renderDashboardAffiliate() {
  const aff = getAffiliateByUserId(currentUser.id);
  if (!aff) {
    document.getElementById('view-dashboard-affiliate').innerHTML = `<p class="cell-muted">Data affiliate tidak ditemukan untuk akun ini.</p>`;
    return;
  }
  const myOrders = DB.orders.filter(o => o.affiliateId === aff.id);
  const successOrders = myOrders.filter(o => o.status === 'selesai' || o.status === 'kirim');
  const commissionEarned = successOrders.reduce((sum, o) => sum + orderTotal(o) * (aff.commissionRate / 100), 0);
  const commissionPending = myOrders.filter(o => o.status === 'baru' || o.status === 'proses')
    .reduce((sum, o) => sum + orderTotal(o) * (aff.commissionRate / 100), 0);

  document.getElementById('view-dashboard-affiliate').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Total Klik Referral</div>
        <div class="stat-value">${aff.clicks.toLocaleString('id-ID')}</div>
        <div class="stat-delta flat">Sepanjang waktu</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Order Berhasil</div>
        <div class="stat-value">${successOrders.length}</div>
        <div class="stat-delta flat">dari ${myOrders.length} order via link Anda</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Komisi Terkumpul</div>
        <div class="stat-value">${formatRupiah(commissionEarned)}</div>
        <div class="stat-delta up">Sudah final / siap cair</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Komisi Belum Cair</div>
        <div class="stat-value">${formatRupiah(commissionPending)}</div>
        <div class="stat-delta flat">Order masih berjalan</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="panel-title">Order dari Link Referral Anda</div>
          <div class="panel-sub">Komisi: ${aff.commissionRate}% per order</div>
        </div>
      </div>
      <div class="panel-body no-pad">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Produk</th><th>Qty</th><th>Total Order</th><th>Komisi Anda</th><th>Status</th></tr></thead>
            <tbody>
              ${myOrders.length === 0 ? `<tr class="empty-row"><td colspan="5">Belum ada order dari link referral Anda.</td></tr>` :
                myOrders.map(o => `
                  <tr>
                    <td class="cell-strong">${o.product}</td>
                    <td>${o.qty.toLocaleString('id-ID')}</td>
                    <td>${formatRupiah(orderTotal(o))}</td>
                    <td class="cell-strong">${formatRupiah(orderTotal(o) * (aff.commissionRate / 100))}</td>
                    <td><span class="badge ${STATUS_LABELS[o.status].badge}">${STATUS_LABELS[o.status].label}</span></td>
                  </tr>
                `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;
}

function renderLinkReferral() {
  const aff = getAffiliateByUserId(currentUser.id);
  if (!aff) {
    document.getElementById('view-link-referral').innerHTML = `<p class="cell-muted">Data affiliate tidak ditemukan.</p>`;
    return;
  }

  document.getElementById('view-link-referral').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Link Referral Anda</div>
      </div>
      <div class="panel-body">
        <div class="referral-box">
          <div>
            <label class="field-label">Link Unik</label>
            <div class="referral-link-row">
              <input class="referral-link-input" id="referral-link-text" value="${aff.referralLink}" readonly>
              <button class="btn-secondary btn-sm" onclick="copyReferralLink()"><i class="fa-solid fa-copy"></i> Salin</button>
            </div>
          </div>
          ${aff.coupon ? `
            <div>
              <label class="field-label">Kode Kupon</label>
              <div class="coupon-display"><i class="fa-solid fa-ticket"></i> ${aff.coupon}</div>
            </div>
          ` : ''}
          <p style="font-size:11px; color:var(--gray-text); letter-spacing:0.03em; line-height:1.7;">
            Bagikan link atau kode kupon ini ke calon klien. Setiap klik dan order yang masuk melalui link Anda akan otomatis tercatat di dashboard performa.
          </p>
        </div>
      </div>
    </div>
  `;
}

function copyReferralLink() {
  const input = document.getElementById('referral-link-text');
  input.select();
  try {
    navigator.clipboard.writeText(input.value);
    showToast('Link referral disalin ke clipboard.');
  } catch (e) {
    showToast('Gagal menyalin. Salin manual dari kolom di atas.');
  }
}

function renderStatistikAffiliate() {
  const aff = getAffiliateByUserId(currentUser.id);
  if (!aff) {
    document.getElementById('view-statistik-affiliate').innerHTML = `<p class="cell-muted">Data affiliate tidak ditemukan.</p>`;
    return;
  }

  // Simulasi statistik mingguan dari total klik (distribusi sederhana, deterministik)
  const days = ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'];
  const weights = [0.18, 0.12, 0.15, 0.1, 0.2, 0.14, 0.11];
  const dailyClicks = weights.map(w => Math.round(aff.clicks * w / 4)); // perkiraan klik per hari, skala mingguan
  const maxClicks = Math.max(...dailyClicks, 1);

  document.getElementById('view-statistik-affiliate').innerHTML = `
    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="panel-title">Statistik Klik Mingguan</div>
          <div class="panel-sub">Estimasi distribusi klik referral per hari (minggu ini)</div>
        </div>
      </div>
      <div class="panel-body">
        <div class="bar-list">
          ${days.map((d, i) => `
            <div class="bar-row">
              <div class="bar-label">${d}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${(dailyClicks[i] / maxClicks) * 100}%"></div></div>
              <div class="bar-value">${dailyClicks[i]}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Conversion Rate</div>
        <div class="stat-value">${aff.clicks > 0 ? ((DB.orders.filter(o => o.affiliateId === aff.id).length / aff.clicks) * 100).toFixed(1) : 0}%</div>
        <div class="stat-delta flat">Order / Total Klik</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Rate Komisi Anda</div>
        <div class="stat-value">${aff.commissionRate}%</div>
        <div class="stat-delta flat">Per order berhasil</div>
      </div>
    </div>
  `;
}

</script>

  const PAGE_TITLES = {
    'dashboard-keuangan': 'Dashboard Keuangan',
    'dashboard-performa': 'Dashboard Performa Bisnis',
    'instruksi-produksi': 'Instruksi Produksi',
    'kelola-user': 'Kelola User',
    'kelola-produk': 'Kelola Produk',
    'kelola-order-superadmin': 'Kelola Order',

    'kelola-order': 'Kelola Order',
    'kelola-klien': 'Data Klien',
    'kelola-affiliate': 'Program Affiliate',

  // Reset orderPage setiap pindah ke menu order agar selalu mulai dari halaman 1
  document.addEventListener('DOMContentLoaded', () => {
    initAuth();
  });
</script>
